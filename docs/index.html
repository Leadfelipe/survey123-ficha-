<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de Cadastro — Survey123</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a18;min-height:100vh}
:root{--blue:#185FA5;--blue-bg:#E6F1FB;--blue-lt:#B5D4F4;--green:#3B6D11;--green-bg:#EAF3DE;--red:#A32D2D;--red-bg:#FCEBEB;--border:#d3d1c7;--radius:8px}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-card{background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:380px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.login-logo svg{width:28px;height:28px}
.login-logo span{font-size:17px;font-weight:500}
.login-card h2{font-size:15px;font-weight:500;margin-bottom:1.5rem;color:#444}
label{display:block;font-size:12px;color:#888;margin-bottom:4px;margin-top:12px}
input[type=text],input[type=password],input[type=url]{width:100%;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:14px;outline:none;background:#fff;color:#1a1a18}
input:focus{border-color:var(--blue);box-shadow:0 0 0 2px #E6F1FB}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border);background:#fff;color:#1a1a18;font-size:13px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f3}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-dl{background:var(--green-bg);color:var(--green);border-color:#C0DD97}
.btn-dl:hover{background:#C0DD97}
.err{font-size:12px;color:var(--red);background:var(--red-bg);padding:8px 10px;border-radius:6px;margin-top:10px;display:none}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* App */
#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{background:#fff;border-bottom:0.5px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar h1{font-size:15px;font-weight:500}
.tag-user{font-size:12px;color:#888;background:#f5f5f3;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border)}
main{padding:1.5rem;max-width:1200px;margin:0 auto;width:100%}
.toolbar{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;background:#fff}
.search-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#888}
.count-badge{font-size:12px;color:#888;padding:4px 10px;background:#f5f5f3;border-radius:20px;border:0.5px solid var(--border);white-space:nowrap}
.status{font-size:12px;color:#888;padding:6px 0}

/* Tabela */
.table-wrap{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f9f9f7;border-bottom:0.5px solid var(--border)}
th{padding:9px 12px;text-align:left;font-weight:500;font-size:12px;color:#666;white-space:nowrap}
td{padding:9px 12px;border-bottom:0.5px solid #f0efe8;color:#1a1a18;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
td.oid{font-family:monospace;font-size:12px;color:#888;width:60px}
.empty{text-align:center;padding:3rem;color:#888}
.loading-row td{text-align:center;padding:2rem;color:#888}
.shimmer{display:inline-block;width:120px;height:12px;background:#eee;border-radius:4px;animation:shimmer 1.2s infinite}
@keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

/* Toast */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1a18;color:#fff;padding:10px 14px;border-radius:var(--radius);font-size:13px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#27500A}
.toast.fail{background:#791F1F}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#185FA5"/>
        <path d="M14 6L20 10V18L14 22L8 18V10L14 6Z" fill="white" opacity=".9"/>
        <circle cx="14" cy="14" r="3" fill="#185FA5"/>
      </svg>
      <span>Ficha de Cadastro</span>
    </div>
    <h2>Entrar com ArcGIS Online</h2>

    <label>Usuário ArcGIS Online</label>
    <input type="text" id="inp-user" placeholder="seu_usuario" autocomplete="username">

    <label>Senha</label>
    <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">

    <label>URL do Feature Layer</label>
    <input type="url" id="inp-url" placeholder="https://services.arcgis.com/…/FeatureServer/0">
    <div style="font-size:11px;color:#aaa;margin-top:4px">Cole a URL do seu Feature Service (termina em /FeatureServer/0)</div>

    <button class="btn btn-primary" id="btn-login" style="width:100%;justify-content:center;margin-top:20px" onclick="doLogin()">
      <span class="spinner" id="spin-login"></span>
      <span id="btn-login-txt">Entrar</span>
    </button>
    <div class="err" id="login-err"></div>
    <p style="font-size:11px;color:#aaa;margin-top:16px;line-height:1.5">Suas credenciais são usadas apenas para obter um token temporário diretamente na API do ArcGIS. Nada é salvo ou enviado a terceiros.</p>
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
        <rect width="20" height="20" rx="4" fill="#185FA5"/>
        <path d="M10 4L14 7V13L10 16L6 13V7L10 4Z" fill="white" opacity=".9"/>
        <circle cx="10" cy="10" r="2.2" fill="#185FA5"/>
      </svg>
      <h1>Ficha de Cadastro</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="tag-user" id="lbl-user"></span>
      <button class="btn btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="#888" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="inp-search" placeholder="Buscar em qualquer campo…" oninput="filtrar()">
      </div>
      <span class="count-badge" id="lbl-count">— registros</span>
      <button class="btn btn-sm" onclick="carregarDados()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M13 8A5 5 0 1 1 8 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 1v4l2-2M8 5L6 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Atualizar
      </button>
    </div>
    <div class="status" id="lbl-status"></div>

    <div class="table-wrap">
      <div class="tbl-scroll">
        <table id="tbl">
          <thead id="tbl-head"></thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
var TOKEN = '', FEATURE_URL = '', USUARIO = '';
var todosRegistros = [], camposVisiveis = [];

// ── COLUNAS PRIORITÁRIAS (aparecem primeiro na tabela) ──────────────────────
var COL_PRIO = ['OBJECTID','codigo','nome','nome_imovel','municipios','empre','datas','vistoriador'];

function doLogin(){
  var u = document.getElementById('inp-user').value.trim();
  var p = document.getElementById('inp-pass').value;
  var url = document.getElementById('inp-url').value.trim().replace(/\/+$/, '');
  var err = document.getElementById('login-err');
  err.style.display = 'none';
  if(!u||!p||!url){err.textContent='Preencha todos os campos.';err.style.display='block';return;}
  setLoginLoading(true);
  FEATURE_URL = url;
  USUARIO = u;
  fetch('https://www.arcgis.com/sharing/rest/generateToken',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({username:u,password:p,referer:location.origin,expiration:'120',f:'json'})
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.error){throw new Error(res.error.message||'Usuário ou senha inválidos');}
    TOKEN = res.token;
    document.getElementById('lbl-user').textContent = u;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    carregarDados();
  })
  .catch(e=>{err.textContent=e.message;err.style.display='block';})
  .finally(()=>setLoginLoading(false));
}

function setLoginLoading(on){
  document.getElementById('spin-login').style.display = on?'block':'none';
  document.getElementById('btn-login-txt').textContent = on?'Entrando…':'Entrar';
  document.getElementById('btn-login').disabled = on;
}

function doLogout(){
  TOKEN='';FEATURE_URL='';USUARIO='';todosRegistros=[];
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('inp-pass').value='';
  document.getElementById('inp-search').value='';
}

function carregarDados(){
  var body = document.getElementById('tbl-body');
  var head = document.getElementById('tbl-head');
  body.innerHTML='<tr class="loading-row"><td colspan="20" style="text-align:center;padding:2rem;color:#888">Carregando dados…</td></tr>';
  document.getElementById('lbl-status').textContent='';
  document.getElementById('lbl-count').textContent='Carregando…';

  fetch(FEATURE_URL+'/query?'+new URLSearchParams({
    where:'1=1', outFields:'*', f:'json', token:TOKEN, resultRecordCount:2000
  }))
  .then(r=>r.json())
  .then(res=>{
    if(res.error) throw new Error(res.error.message);
    var features = res.features||[];
    todosRegistros = features.map(f=>f.attributes);

    // Define colunas visíveis: prioritárias primeiro, depois o resto
    var todosCampos = todosRegistros.length ? Object.keys(todosRegistros[0]) : [];
    var prio = COL_PRIO.filter(c=>todosCampos.includes(c));
    var resto = todosCampos.filter(c=>!COL_PRIO.includes(c) && !c.startsWith('Shape') && c!=='GlobalID');
    camposVisiveis = prio.concat(resto).slice(0,12); // máx 12 colunas na tabela

    renderHead();
    filtrar();
    document.getElementById('lbl-status').textContent =
      'Última atualização: '+new Date().toLocaleTimeString('pt-BR');
  })
  .catch(e=>{
    body.innerHTML='<tr><td colspan="20" class="empty">Erro ao carregar: '+e.message+'</td></tr>';
    toast(e.message,'fail');
  });
}

function renderHead(){
  var tr = '<tr>';
  camposVisiveis.forEach(function(c){
    tr += '<th>'+c+'</th>';
  });
  tr += '<th style="width:90px">Ação</th></tr>';
  document.getElementById('tbl-head').innerHTML = tr;
}

function filtrar(){
  var q = document.getElementById('inp-search').value.toLowerCase().trim();
  var filtrados = q
    ? todosRegistros.filter(function(r){
        return Object.values(r).some(function(v){
          return v!=null && String(v).toLowerCase().includes(q);
        });
      })
    : todosRegistros;

  document.getElementById('lbl-count').textContent = filtrados.length + ' registro' + (filtrados.length!==1?'s':'');
  renderRows(filtrados);
}

function renderRows(rows){
  var body = document.getElementById('tbl-body');
  if(!rows.length){
    body.innerHTML='<tr><td colspan="20" class="empty">Nenhum registro encontrado</td></tr>';
    return;
  }
  var html = '';
  rows.forEach(function(r){
    var oid = r.OBJECTID || r.objectid || r.ObjectID || '';
    html += '<tr>';
    camposVisiveis.forEach(function(c){
      var v = r[c];
      if(v==null) v='';
      // Formata timestamps
      if(typeof v==='number' && v>1e12){
        try{ v = new Date(v).toLocaleDateString('pt-BR'); }catch(e){}
      }
      html += '<td title="'+String(v).replace(/"/g,'&quot;')+'">'+escHtml(String(v))+'</td>';
    });
    html += '<td><button class="btn btn-dl btn-sm" onclick="baixarFicha('+oid+',this)">Baixar</button></td>';
    html += '</tr>';
  });
  body.innerHTML = html;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── DOWNLOAD DA FICHA ────────────────────────────────────────────────────────

function baixarFicha(oid, btn){
  if(!oid){toast('OBJECTID não encontrado','fail');return;}
  btn.disabled=true;
  btn.textContent='…';

  Promise.all([
    fetch(FEATURE_URL+'/query?'+new URLSearchParams({objectIds:oid,outFields:'*',f:'json',token:TOKEN,returnGeometry:'true'})).then(r=>r.json()),
    fetch(FEATURE_URL+'/'+oid+'/attachments?'+new URLSearchParams({f:'json',token:TOKEN})).then(r=>r.json())
  ])
  .then(function(results){
    var qRes = results[0], aRes = results[1];
    if(qRes.error) throw new Error(qRes.error.message);
    var dados = (qRes.features[0]||{}).attributes || {};
    var anexos = (aRes.attachmentInfos||[]).filter(function(a){
      return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(a.name);
    });
    return gerarDocx(dados, anexos, oid);
  })
  .then(function(blob){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'ficha_cadastro_oid'+oid+'_'+new Date().toISOString().slice(0,10)+'.docx';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    toast('Ficha OID '+oid+' baixada!','ok');
  })
  .catch(function(e){ toast('Erro: '+e.message,'fail'); })
  .finally(function(){ btn.disabled=false; btn.textContent='Baixar'; });
}

// ── GERAÇÃO DO DOCX NO NAVEGADOR ─────────────────────────────────────────────

function fmtValor(v, fmtData){
  if(v==null) return '';
  if(typeof v==='number' && v>1e12){
    try{
      var d = new Date(v);
      if(fmtData){
        return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
      }
      return d.toLocaleDateString('pt-BR');
    }catch(e){ return String(v); }
  }
  return String(v);
}

function fmtCheck(dados, campo, opcao){
  var val = String(dados[campo]||'');
  var sels = val.split(/[,;]/).map(s=>s.trim());
  return sels.includes(opcao.trim()) ? '☑' : '☐';
}

var RE_CHECKED  = /\$\{(\w+)\s*[│|]\s*checked:"([^"]+)"\}/g;
var RE_DATA     = /\$\{(\w+)\s*[│|]\s*format:"([^"]+)"\}/g;
var RE_IF_BLK   = /\$\{if\s+(\w+)\s*[│|]\s*selected:"([^"]+)"\}([\s\S]*?)\$\{\/\}/g;
var RE_SIMPLES  = /\$\{(\w+)\}/g;
var RE_FOTO_MK  = /\$\{\$file[^}]*\}/g;
var RE_LIXO     = /\$\{[^}]*\}/g;

function processarTexto(txt, dados){
  txt = txt.replace(RE_CHECKED, function(_,c,o){ RE_CHECKED.lastIndex=0; return fmtCheck(dados,c,o); });
  txt = txt.replace(RE_DATA,    function(_,c,f){ RE_DATA.lastIndex=0;    return fmtValor(dados[c],f); });
  txt = txt.replace(RE_IF_BLK,  function(_,c,o,inner){
    RE_IF_BLK.lastIndex=0;
    var val = String(dados[c]||'').toLowerCase();
    return o.toLowerCase()===val ? processarTexto(inner,dados) : '';
  });
  txt = txt.replace(RE_FOTO_MK, '[FOTO]');
  txt = txt.replace(RE_SIMPLES, function(_,c){ RE_SIMPLES.lastIndex=0; return fmtValor(dados[c]); });
  txt = txt.replace(RE_LIXO, '');
  return txt;
}

async function fetchModeloBase64(){
  // Carrega o modelo .docx do mesmo diretório
  var r = await fetch('FICHA_DE_CADASTRO.docx');
  if(!r.ok) throw new Error('Modelo FICHA_DE_CADASTRO.docx não encontrado na pasta docs/');
  var buf = await r.arrayBuffer();
  return buf;
}

async function gerarDocx(dados, anexosInfo, oid){
  // Carrega fotos como base64
  var fotos = [];
  for(var i=0;i<anexosInfo.length;i++){
    var info = anexosInfo[i];
    try{
      var r = await fetch(FEATURE_URL+'/'+oid+'/attachments/'+info.id+'?token='+TOKEN);
      var buf = await r.arrayBuffer();
      fotos.push({nome:info.name, buf:buf, tipo: info.contentType||'image/jpeg'});
    }catch(e){ console.warn('Foto falhou:',info.name,e); }
  }

  // Descompacta o modelo .docx (que é um ZIP)
  var modeloBuf = await fetchModeloBase64();
  var JSZip = (await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js')).default;
  if(!JSZip) throw new Error('JSZip não carregou');

  var zip = await JSZip.loadAsync(modeloBuf);

  // Processa document.xml
  var docXml = await zip.file('word/document.xml').async('string');
  docXml = substituirNoXml(docXml, dados);

  // Se há marcador [FOTO], insere fotos no XML
  if(fotos.length && docXml.includes('[FOTO]')){
    var fotoXml = await montarXmlFotos(fotos, zip);
    docXml = docXml.replace('[FOTO]', fotoXml);
  } else if(fotos.length){
    var paginaFotos = await montarXmlFotos(fotos, zip);
    // Insere antes do </w:body>
    docXml = docXml.replace('</w:body>', paginaFotos + '</w:body>');
  }

  zip.file('word/document.xml', docXml);

  // Processa header/footer
  var arquivos = Object.keys(zip.files);
  for(var i=0;i<arquivos.length;i++){
    var nome = arquivos[i];
    if(/^word\/(header|footer)\d*\.xml$/.test(nome)){
      var xml = await zip.file(nome).async('string');
      zip.file(nome, substituirNoXml(xml, dados));
    }
  }

  var blob = await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  return blob;
}

function substituirNoXml(xml, dados){
  // Remove tags XML dos textos para processar marcadores que foram fragmentados
  // Estratégia: une runs adjacentes com mesmo estilo antes de substituir
  xml = reunirRuns(xml);
  // Agora substitui dentro dos elementos <w:t>
  xml = xml.replace(/(<w:t[^>]*>)([\s\S]*?)(<\/w:t>)/g, function(_, open, conteudo, close){
    if(!conteudo.includes('$')) return _;
    return open + processarTexto(conteudo, dados) + close;
  });
  return xml;
}

function reunirRuns(xml){
  // Une textos de runs consecutivos com mesmo rPr para evitar marcadores fragmentados
  // Simplificado: apenas une <w:t> separados por </w:t><w:t>
  return xml.replace(/<\/w:t><\/w:r><w:r><w:rPr>([\s\S]*?)<\/w:rPr><w:t([^>]*)>/g,
    function(_, rpr1, attrs){
      return '</w:t></w:r><w:r><w:rPr>'+rpr1+'</w:rPr><w:t'+attrs+'>';
    }
  );
}

async function montarXmlFotos(fotos, zip){
  var xmlFotos = '<w:p><w:pPr><w:jc w:val="center"/></w:pPr></w:p>';
  xmlFotos += '<w:p><w:pPr><w:pStyle w:val="Heading2"/></w:pPr><w:r><w:t>Registros Fotográficos</w:t></w:r></w:p>';

  var rels = await zip.file('word/_rels/document.xml.rels').async('string');
  var ct   = await zip.file('[Content_Types].xml').async('string');

  for(var i=0;i<fotos.length;i++){
    var f = fotos[i];
    var ext = f.nome.split('.').pop().toLowerCase();
    var mime = ext==='jpg'||ext==='jpeg' ? 'image/jpeg' : 'image/'+ext;
    var rId = 'rIdFoto'+i;
    var imgNome = 'media/foto'+i+'.'+ext;

    // Adiciona imagem ao ZIP
    zip.file('word/'+imgNome, f.buf);

    // Adiciona relação
    var relNova = '<Relationship Id="'+rId+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="'+imgNome+'"/>';
    rels = rels.replace('</Relationships>', relNova+'</Relationships>');

    // Adiciona content type se não existir
    if(!ct.includes('Extension="'+ext+'"')){
      ct = ct.replace('</Types>', '<Default Extension="'+ext+'" ContentType="'+mime+'"/></Types>');
    }

    // EMU: 1 polegada = 914400; largura=5 polegadas
    var cx = 4572000, cy = 3429000; // ~5 x 3.75 pol
    xmlFotos += '<w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr/><w:drawing>'
      +'<wp:inline xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">'
      +'<wp:extent cx="'+cx+'" cy="'+cy+'"/>'
      +'<wp:docPr id="'+(100+i)+'" name="foto'+i+'"/>'
      +'<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">'
      +'<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">'
      +'<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">'
      +'<pic:nvPicPr><pic:cNvPr id="'+(100+i)+'" name="foto'+i+'"/><pic:cNvPicPr/></pic:nvPicPr>'
      +'<pic:blipFill><a:blip r:embed="'+rId+'" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>'
      +'<a:stretch><a:fillRect/></a:stretch></pic:blipFill>'
      +'<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="'+cx+'" cy="'+cy+'"/></a:xfrm>'
      +'<a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>'
      +'</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>';

    // Legenda
    xmlFotos += '<w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:i/><w:sz w:val="18"/></w:rPr><w:t>'+f.nome+'</w:t></w:r></w:p>';
  }

  zip.file('word/_rels/document.xml.rels', rels);
  zip.file('[Content_Types].xml', ct);
  return xmlFotos;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, tipo){
  var wrap = document.getElementById('toasts');
  var el = document.createElement('div');
  el.className = 'toast'+(tipo?' '+tipo:'');
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ el.classList.add('show'); }); });
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3500);
}
