<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de Cadastro — Survey123</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a18;min-height:100vh}
:root{--blue:#185FA5;--blue-bg:#E6F1FB;--green:#3B6D11;--green-bg:#EAF3DE;--red:#A32D2D;--red-bg:#FCEBEB;--border:#d3d1c7;--radius:8px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.card{background:#fff;border:0.5px solid var(--border);border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:440px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.logo span{font-size:17px;font-weight:500}
h2{font-size:15px;font-weight:500;margin-bottom:6px;color:#444}
.sub{font-size:13px;color:#888;margin-bottom:1.5rem;line-height:1.5}
label{display:block;font-size:12px;color:#888;margin-bottom:4px;margin-top:14px}
input,textarea{width:100%;padding:9px 10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;background:#fff;color:#1a1a18;font-family:inherit}
textarea{resize:vertical;min-height:70px;font-size:12px;font-family:monospace}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px #E6F1FB}
.hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.4}
.tabs{display:flex;gap:0;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:0}
.tab{flex:1;padding:8px;font-size:13px;text-align:center;cursor:pointer;border:none;background:#f9f9f7;color:#888;font-family:inherit}
.tab.active{background:#fff;color:var(--blue);font-weight:500}
.tab-content{display:none}
.tab-content.active{display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius);border:none;font-size:14px;cursor:pointer;font-family:inherit;width:100%;margin-top:18px;font-weight:500}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#0C447C}
.btn-primary:disabled{background:#B5D4F4;cursor:not-allowed}
.btn-sm{padding:5px 11px;font-size:12px;width:auto;border:0.5px solid var(--border);background:#fff;border-radius:var(--radius);cursor:pointer;font-family:inherit}
.btn-sm:hover{background:#f5f5f3}
.btn-dl{background:var(--green-bg);color:var(--green);border:0.5px solid #C0DD97;border-radius:var(--radius);padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-dl:hover{background:#C0DD97}
.btn-dl:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:var(--red);background:var(--red-bg);padding:8px 10px;border-radius:6px;margin-top:12px;display:none}
.info-box{font-size:12px;color:#0C447C;background:#E6F1FB;padding:10px 12px;border-radius:6px;margin-top:12px;line-height:1.6;border:0.5px solid #B5D4F4}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{background:#fff;border-bottom:0.5px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:500}
.tag{font-size:12px;color:#888;background:#f5f5f3;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border)}
.tag-exp{font-size:11px;color:#A32D2D;background:#FCEBEB;padding:3px 9px;border-radius:20px;border:0.5px solid #F09595;display:none}
main{padding:1.5rem;max-width:1200px;margin:0 auto;width:100%}
.toolbar{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:200px}
.sw input{padding-left:32px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#888;pointer-events:none}
.badge{font-size:12px;color:#888;padding:4px 10px;background:#f5f5f3;border-radius:20px;border:0.5px solid var(--border);white-space:nowrap}
.status{font-size:12px;color:#aaa;padding:4px 0 8px}
.tw{background:#fff;border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f9f9f7;border-bottom:0.5px solid var(--border)}
th{padding:9px 12px;text-align:left;font-weight:500;font-size:12px;color:#666;white-space:nowrap}
td{padding:9px 12px;border-bottom:0.5px solid #f0efe8;color:#1a1a18;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.empty{text-align:center;padding:3rem;color:#888;font-size:13px}
.toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1a18;color:#fff;padding:10px 14px;border-radius:var(--radius);font-size:13px;opacity:0;transform:translateY(8px);transition:all .25s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:#27500A}
.toast.fail{background:#791F1F}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div id="login-screen">
  <div class="card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#185FA5"/>
        <path d="M14 6L20 10V18L14 22L8 18V10L14 6Z" fill="white" opacity=".9"/>
        <circle cx="14" cy="14" r="3" fill="#185FA5"/>
      </svg>
      <span>Ficha de Cadastro</span>
    </div>
    <h2>Acessar dados do Survey123</h2>

    <div class="tabs" style="margin-top:12px">
      <button class="tab active" onclick="setTab('token')">Colar Token</button>
      <button class="tab" onclick="setTab('senha')">Usuário e Senha</button>
    </div>

    <!-- ABA TOKEN -->
    <div id="tab-token" class="tab-content active">
      <div class="info-box">
        Como obter o token:<br>
        1. Abra o Survey123 no navegador (já logado)<br>
        2. Pressione <strong>F12</strong> → aba <strong>Network</strong><br>
        3. Recarregue (<strong>F5</strong>), filtre por <strong>query</strong><br>
        4. Clique numa requisição → <strong>Payload</strong> → copie o valor de <strong>token</strong>
      </div>
      <label>Token ArcGIS</label>
      <textarea id="inp-token" placeholder="Cole aqui o token copiado do F12…" rows="3"></textarea>
      <label>URL do Feature Layer</label>
      <input type="url" id="inp-url-token" value="https://services3.arcgis.com/ba17q0p2zHwzRK3B/arcgis/rest/services/survey123_011b2663466f4ee089154d0215e7667e_results/FeatureServer/0">
    </div>

    <!-- ABA SENHA -->
    <div id="tab-senha" class="tab-content">
      <label>Portal ArcGIS</label>
      <input type="url" id="inp-portal" value="https://leadgf.maps.arcgis.com">
      <label>Usuário</label>
      <input type="text" id="inp-user" placeholder="felipe.oliveira" autocomplete="username">
      <label>Senha</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
      <label>URL do Feature Layer</label>
      <input type="url" id="inp-url-senha" value="https://services3.arcgis.com/ba17q0p2zHwzRK3B/arcgis/rest/services/survey123_011b2663466f4ee089154d0215e7667e_results/FeatureServer/0">
    </div>

    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
      <span id="btn-ico"></span>
      <span id="btn-txt">Entrar</span>
    </button>
    <div class="err" id="err"></div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <rect width="20" height="20" rx="4" fill="#185FA5"/>
        <path d="M10 4L14 7V13L10 16L6 13V7L10 4Z" fill="white" opacity=".9"/>
        <circle cx="10" cy="10" r="2.2" fill="#185FA5"/>
      </svg>
      <h1>Ficha de Cadastro</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="tag-exp" id="lbl-exp">Token expirando</span>
      <span class="tag" id="lbl-user"></span>
      <button class="btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <main>
    <div class="toolbar">
      <div class="sw">
        <svg class="si" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="#888" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="inp-search" placeholder="Buscar em qualquer campo…" oninput="filtrar()">
      </div>
      <span class="badge" id="lbl-count">— registros</span>
      <button class="btn-sm" onclick="carregarDados()">↺ Atualizar</button>
    </div>
    <div class="status" id="lbl-status"></div>
    <div class="tw"><div class="ts">
      <table><thead id="th"></thead><tbody id="tb"></tbody></table>
    </div></div>
  </main>
</div>

<div class="toasts" id="toasts"></div>

<script>
var TOKEN='', FEATURE_URL='';
var todos=[], cols=[];
var PRIO=['OBJECTID','codigo','nome','nome_imovel','municipios','empre','datas','vistoriador'];
var tabAtual='token';

function setTab(t){
  tabAtual=t;
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['token','senha'][i]===t);});
  document.getElementById('tab-token').classList.toggle('active',t==='token');
  document.getElementById('tab-senha').classList.toggle('active',t==='senha');
}

function setLoading(on){
  document.getElementById('btn-login').disabled=on;
  document.getElementById('btn-ico').innerHTML=on?'<div class="spinner"></div>':'';
  document.getElementById('btn-txt').textContent=on?'Entrando…':'Entrar';
}

function showErr(msg){
  var el=document.getElementById('err');
  el.textContent=msg; el.style.display='block';
}

function doLogin(){
  document.getElementById('err').style.display='none';
  if(tabAtual==='token') loginComToken();
  else loginComSenha();
}

function loginComToken(){
  var token=document.getElementById('inp-token').value.trim();
  var url=document.getElementById('inp-url-token').value.trim().replace(/\/+$/,'');
  if(!token){showErr('Cole o token no campo acima.');return;}
  if(!url){showErr('Informe a URL do Feature Layer.');return;}
  setLoading(true);
  // Valida o token fazendo uma chamada simples
  fetch('https://www.arcgis.com/sharing/rest/community/self?f=json&token='+encodeURIComponent(token))
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.error) throw new Error('Token inválido ou expirado.');
    TOKEN=token; FEATURE_URL=url;
    document.getElementById('lbl-user').textContent=res.fullName||res.username||'Usuário';
    entrar();
  })
  .catch(function(e){
    // Token pode ser válido mesmo sem validar no /community/self — tenta direto
    TOKEN=token; FEATURE_URL=url;
    document.getElementById('lbl-user').textContent='Usuário';
    entrar();
  })
  .finally(function(){setLoading(false);});
}

function loginComSenha(){
  var portal=document.getElementById('inp-portal').value.trim().replace(/\/+$/,'');
  var user=document.getElementById('inp-user').value.trim();
  var pass=document.getElementById('inp-pass').value;
  var url=document.getElementById('inp-url-senha').value.trim().replace(/\/+$/,'');
  if(!user||!pass||!url){showErr('Preencha todos os campos.');return;}
  if(!portal) portal='https://www.arcgis.com';
  FEATURE_URL=url;
  setLoading(true);
  tentarToken(portal+'/sharing/rest/generateToken',user,pass)
  .catch(function(){return tentarToken('https://www.arcgis.com/sharing/rest/generateToken',user,pass);})
  .then(function(token){
    TOKEN=token;
    document.getElementById('lbl-user').textContent=user;
    entrar();
  })
  .catch(function(e){showErr(e.message||'Falha na autenticação.');})
  .finally(function(){setLoading(false);});
}

function tentarToken(endpoint,user,pass){
  return fetch(endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({username:user,password:pass,referer:location.origin,expiration:'120',f:'json'})
  }).then(function(r){return r.json();}).then(function(res){
    if(res.error||!res.token) throw new Error(res.error&&res.error.message?res.error.message:'Falha na autenticação');
    return res.token;
  });
}

function entrar(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  carregarDados();
}

function doLogout(){
  TOKEN=''; FEATURE_URL=''; todos=[];
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('inp-search').value='';
  document.getElementById('inp-token').value='';
}

function carregarDados(){
  document.getElementById('tb').innerHTML='<tr><td colspan="20" class="empty">Carregando dados…</td></tr>';
  document.getElementById('lbl-count').textContent='Carregando…';
  fetch(FEATURE_URL+'/query?'+new URLSearchParams({where:'1=1',outFields:'*',f:'json',token:TOKEN,resultRecordCount:2000}))
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.error) throw new Error(res.error.message);
    todos=(res.features||[]).map(function(f){return f.attributes;});
    var all=todos.length?Object.keys(todos[0]):[];
    var p=PRIO.filter(function(c){return all.includes(c);});
    var r=all.filter(function(c){return!PRIO.includes(c)&&!c.startsWith('Shape')&&c!=='GlobalID';});
    cols=p.concat(r).slice(0,12);
    renderHead(); filtrar();
    document.getElementById('lbl-status').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR')+' — '+todos.length+' registros carregados';
  })
  .catch(function(e){
    document.getElementById('tb').innerHTML='<tr><td colspan="20" class="empty">Erro: '+esc(e.message)+'</td></tr>';
    toast(e.message,'fail');
  });
}

function renderHead(){
  var h='<tr>';
  h+='<th style="width:80px">Ação</th>';
  cols.forEach(function(c){h+='<th>'+esc(c)+'</th>';});
  h+='</tr>';
  document.getElementById('th').innerHTML=h;
}

function filtrar(){
  var q=document.getElementById('inp-search').value.toLowerCase().trim();
  var f=q?todos.filter(function(r){
    return Object.values(r).some(function(v){return v!=null&&String(v).toLowerCase().includes(q);});
  }):todos;
  document.getElementById('lbl-count').textContent=f.length+' registro'+(f.length!==1?'s':'');
  renderRows(f);
}

function renderRows(rows){
  if(!rows.length){document.getElementById('tb').innerHTML='<tr><td colspan="20" class="empty">Nenhum registro encontrado</td></tr>';return;}
  var h='';
  rows.forEach(function(r){
    var oid=r.OBJECTID||r.objectid||'';
    h+='<tr>';
    h+='<td><button class="btn-dl" onclick="baixar('+oid+',this)">Baixar</button></td>';
    cols.forEach(function(c){
      var v=r[c]; if(v==null)v='';
      if(typeof v==='number'&&v>1e12){try{v=new Date(v).toLocaleDateString('pt-BR');}catch(e){}}
      h+='<td title="'+esc(String(v))+'">'+esc(String(v))+'</td>';
    });
    h+='</tr>';
  });
  document.getElementById('tb').innerHTML=h;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function baixar(oid,btn){
  if(!oid){toast('OBJECTID não encontrado','fail');return;}
  btn.disabled=true;btn.textContent='…';
  Promise.all([
    fetch(FEATURE_URL+'/query?'+new URLSearchParams({objectIds:oid,outFields:'*',f:'json',token:TOKEN})).then(function(r){return r.json();}),
    fetch(FEATURE_URL+'/'+oid+'/attachments?'+new URLSearchParams({f:'json',token:TOKEN})).then(function(r){return r.json();})
  ])
  .then(function(res){
    if(res[0].error) throw new Error(res[0].error.message);
    var dados=(res[0].features[0]||{}).attributes||{};
    var anx=(res[1].attachmentInfos||[]).filter(function(a){return /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(a.name);});
    return gerarDocx(dados,anx,oid);
  })
  .then(function(blob){
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='ficha_oid'+oid+'_'+new Date().toISOString().slice(0,10)+'.docx';
    a.click();
    toast('Ficha OID '+oid+' baixada!','ok');
  })
  .catch(function(e){toast('Erro: '+e.message,'fail');})
  .finally(function(){btn.disabled=false;btn.textContent='Baixar';});
}

function fv(v){
  if(v==null)return'';
  if(typeof v==='number'&&v>1e12){try{var d=new Date(v);return('0'+d.getDate()).slice(-2)+'/'+(('0'+(d.getMonth()+1)).slice(-2))+'/'+d.getFullYear();}catch(e){return String(v);}}
  return String(v);
}
function fc(dados,campo,opcao){
  var marcado = String(dados[campo]||'').split(/[,;]/).map(function(s){return s.trim();}).includes(opcao.trim());
  return marcado ? '☑' : '☐';
}
function pt(txt,dados){
  txt=txt.replace(/\$\{(\w+)\s*[│|]\s*checked:"([^"]+)"\}/g,function(_,c,o){return fc(dados,c,o);});
  txt=txt.replace(/\$\{(\w+)\s*[│|]\s*format:"([^"]+)"\}/g,function(_,c){return fv(dados[c]);});
  txt=txt.replace(/\$\{if\s+(\w+)\s*[│|]\s*selected:"([^"]+)"\}([\s\S]*?)\$\{\/\}/g,function(_,c,o,inner){
    return String(dados[c]||'').toLowerCase()===o.toLowerCase()?pt(inner,dados):'';
  });
  txt=txt.replace(/\$\{\$file[^}]*\}/g,'[FOTO]');
  txt=txt.replace(/\$\{(\w+)\}/g,function(_,c){return fv(dados[c]);});
  txt=txt.replace(/\$\{[^}]*\}/g,'');
  return txt;
}
function sx(xml,dados){
  // 1. Une runs adjacentes para remontar marcadores fragmentados pelo Word
  // Remove quebras entre </w:t></w:r><w:r><w:rPr>...</w:rPr><w:t> 
  // e entre </w:t></w:r><w:r><w:t> (runs sem rPr)
  var unido = xml;
  // Itera até não haver mais fragmentações
  for(var iter=0;iter<5;iter++){
    // Une runs com mesmo estilo: </w:t></w:r><w:r><w:rPr>MESMO</w:rPr><w:t
    unido = unido.replace(/<\/w:t>(<\/w:r><w:r>(?:<w:rPr>[\s\S]*?<\/w:rPr>)?)<w:t[^>]*>/g, '');
  }
  // 2. Agora substitui os marcadores dentro de <w:t>
  // Substitui marcadores dentro de <w:t>
  var processado = unido.replace(/(<w:t[^>]*>)([\s\S]*?)(<\/w:t>)/g,function(_,o,c,cl){
    if(!c.includes('$')) return _;
    return o+pt(c,dados)+cl;
  });
  // Pós-processa: runs que contêm ☑ ou ☐ recebem fonte "Segoe UI Symbol"
  // que renderiza corretamente esses caracteres Unicode no Word
  processado = processado.replace(
    /(<w:rPr>)([\s\S]*?)(<\/w:rPr>)(<w:t[^>]*>)([^<]*[\u2610\u2611][^<]*)(<\/w:t><\/w:r>)/g,
    function(_,ro,rc,rcl,to,tc,tcl){
      var nf='<w:rFonts w:ascii="Segoe UI Symbol" w:hAnsi="Segoe UI Symbol" w:cs="Segoe UI Symbol"/>'
      return ro+nf+rc.replace(/<w:rFonts[^/]*\/>/g,'')+rcl+to+tc+tcl;
    }
  );
  return processado;
}
async function gerarDocx(dados,anx,oid){
  var fotos=[];
  for(var i=0;i<anx.length;i++){
    try{var r=await fetch(FEATURE_URL+'/'+oid+'/attachments/'+anx[i].id+'?token='+TOKEN);fotos.push({nome:anx[i].name,buf:await r.arrayBuffer()});}catch(e){}
  }
  if(typeof JSZip==='undefined') throw new Error('JSZip não carregou, recarregue a página.');
  var JSZipLib=JSZip;
  var mr=await fetch('FICHA_DE_CADASTRO.docx');
  if(!mr.ok)throw new Error('Modelo FICHA_DE_CADASTRO.docx não encontrado');
  var zip=await JSZipLib.loadAsync(await mr.arrayBuffer());
  var doc=await zip.file('word/document.xml').async('string');
  doc=sx(doc,dados);
  if(fotos.length){
    var fx=await mkFotos(fotos,zip);
    doc=doc.includes('[FOTO]')?doc.replace('[FOTO]',fx):doc.replace('</w:body>',fx+'</w:body>');
  }
  zip.file('word/document.xml',doc);
  for(var n of Object.keys(zip.files)){
    if(/^word\/(header|footer)\d*\.xml$/.test(n)) zip.file(n,sx(await zip.file(n).async('string'),dados));
  }
  return zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}
async function mkFotos(fotos,zip){
  var rels=await zip.file('word/_rels/document.xml.rels').async('string');
  var ct=await zip.file('[Content_Types].xml').async('string');
  var xml='<w:p><w:pPr><w:pStyle w:val="Heading2"/></w:pPr><w:r><w:t>Registros Fotogr\u00e1ficos</w:t></w:r></w:p>';
  for(var i=0;i<fotos.length;i++){
    var f=fotos[i],ext=f.nome.split('.').pop().toLowerCase(),rId='rIdF'+i;
    zip.file('word/media/foto'+i+'.'+ext,f.buf);
    rels=rels.replace('</Relationships>','<Relationship Id="'+rId+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/foto'+i+'.'+ext+'"/></Relationships>');
    if(!ct.includes('Extension="'+ext+'"'))ct=ct.replace('</Types>','<Default Extension="'+ext+'" ContentType="image/'+(ext==='jpg'?'jpeg':ext)+'"/></Types>');
    xml+='<w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:drawing><wp:inline xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"><wp:extent cx="4572000" cy="3429000"/><wp:docPr id="'+(100+i)+'" name="f'+i+'"/><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="'+(100+i)+'" name="f'+i+'"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="'+rId+'" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="4572000" cy="3429000"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>';
  }
  zip.file('word/_rels/document.xml.rels',rels);
  zip.file('[Content_Types].xml',ct);
  return xml;
}
function toast(msg,tipo){
  var w=document.getElementById('toasts'),el=document.createElement('div');
  el.className='toast'+(tipo?' '+tipo:'');el.textContent=msg;w.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('show');});});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},300);},3500);
}
document.getElementById('inp-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
